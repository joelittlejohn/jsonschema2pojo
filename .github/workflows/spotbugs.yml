---
name: SpotBugs

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  spotbugs:
    runs-on: ubuntu-latest
    name: SpotBugs Analysis
    steps:
      - name: Setup Maven Action
        uses: s4u/setup-maven-action@v1.18.0
        with:
          checkout-fetch-depth: 0
          java-version: 17
          java-distribution: temurin
      - name: Run SpotBugs
        run: ./mvnw compile spotbugs:check -B -Pspotbugs
